name: Feature request
description: Suggest an enhancement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to accomplish that the provider can't do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Sketch the schema/HCL if you can.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
