name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build & vet
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      # cross-compile the Linux-only embedded buildkitd path to keep it building
      # even when CI runs on macOS.
      - name: go build (linux cross)
        run: GOOS=linux GOARCH=amd64 go build ./...

      - name: Verify go.mod is tidy
        if: matrix.os == 'ubuntu-latest'
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

  unit:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # acceptance tests (TF_ACC) require a live buildkit endpoint and are
      # skipped here; this runs the plain unit tests only, with the race
      # detector enabled (the auth provider is called concurrently during
      # multi-platform builds).
      - name: go test
        run: go test -race -v -cover ./...

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  acceptance:
    name: acceptance tests
    runs-on: ubuntu-latest
    env:
      TF_ACC: "1"
      BUILDKIT_HOST: tcp://127.0.0.1:1234
      BUILDKIT_TEST_REGISTRY: 127.0.0.1:5500
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Start local registry
        run: docker run -d --name registry -p 5500:5000 registry:2

      - name: Start buildkitd
        # --network host so both the test process (BUILDKIT_HOST) and buildkitd
        # itself reach 127.0.0.1:1234 and the host registry at 127.0.0.1:5500.
        run: |
          docker run -d --name buildkitd --privileged --network host \
            moby/buildkit:v0.29.0 \
            --addr tcp://0.0.0.0:1234

      - name: Wait for buildkitd
        run: |
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/1234) >/dev/null 2>&1; then
              echo "buildkitd up"; break
            fi
            sleep 1
          done

      - name: go test (acceptance)
        run: go test -v -timeout 30m ./...
